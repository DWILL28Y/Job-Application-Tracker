<h1>Job Application Tracker</h1>

<p>Track your job applications in one place.</p>

<form action="/" method="post">
    <label for="company">Company:</label>
    <input type="text" id="company" name="company" required>

    <label for="position">Position:</label>
    <input type="text" id="position" name="position" required>

    <select id="status" name="status">
        <option value="interested">Interested</option>
        <option value="applied">Applied</option>
        <option value="interviewing">Interviewing</option>
        <option value="offered">Offered</option>
        <option value="rejected">Rejected</option>
    </select>

    <label for="date_applied">Date Applied:</label>
    <input type="date" id="date_applied" name="date_applied" value="YYYY-MM-DD">

    <label for="job_link">Job Link:</label>
    <input type="url" id="job_link" name="job_link" placeholder="https://example.com/job-posting">

    <button type="submit">Add Application</button>
</form>
<ol>
    {% for app in applications %}
        <li>{{ app.company }} - {{ app.position }} ({{ app.status }}) Date Applied: {{ app.date_applied }} Job Link: <a href="{{ app.job_link }}" target="_blank">View Job</a></li>
    {% endfor %}
</ol>
